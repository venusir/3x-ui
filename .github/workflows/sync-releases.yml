name: Auto Sync Upstream Releases

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动检查一次
  workflow_dispatch: # 支持手动点击按钮随时触发

# 赋予工作流写入 Release 的权限
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 直接进入核心逻辑，不再使用任何可能过期的第三方或旧版官方公开 Action
      - name: Fetch and Sync Upstream Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 动态获取上游仓库名 (例如: owner/repo)
          UPSTREAM_REPO=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/${{ github.repository }} \
            | jq -r '.parent.full_name')
          
          if [ "$UPSTREAM_REPO" = "null" ] || [ -z "$UPSTREAM_REPO" ]; then
            echo "错误: 当前仓库不是一个 Fork 仓库，无法获取上游信息！"
            exit 1
          fi
          echo "成功识别到上游仓库: $UPSTREAM_REPO"

          # 2. 获取上游最新的 Release 标签名
          LATEST_TAG=$(gh api repos/$UPSTREAM_REPO/releases/latest --jq '.tag_name' 2>/dev/null || echo "")
          
          if [ -z "$LATEST_TAG" ]; then
            echo "提示: 上游仓库目前没有任何公开的 Release。"
            exit 0
          fi
          echo "上游最新版本为: $LATEST_TAG"

          # 3. 检查自己仓库中是否已经存在该 Release
          if gh release view "$LATEST_TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "检查完毕: 本地已是最新版本 ($LATEST_TAG)，无需同步。"
            exit 0
          fi

          echo "发现新版本！开始同步 $LATEST_TAG 及其 Assets..."

          # 4. 下载上游最新 Release 的所有数据（日志、标题、附件）
          mkdir -p upstream_release
          gh release download "$LATEST_TAG" -R "$UPSTREAM_REPO" -D ./upstream_release || true
          
          # 提取上游的标题和日志内容
          gh api repos/$UPSTREAM_REPO/releases/latest --jq '.name' > title.txt
          gh api repos/$UPSTREAM_REPO/releases/latest --jq '.body' > body.txt

          # 5. 直接在当前 Fork 仓库中创建对应的 Release 并上传文件
          # 使用 -R 明确指定目标为你自己的仓库，避免依赖本地克隆的 git 状态
          gh release create "$LATEST_TAG" ./upstream_release/* \
            -R "${{ github.repository }}" \
            -t "$(cat title.txt)" \
            -F body.txt

          echo "🎉 完美同步成功，且未触发任何环境警告！"
